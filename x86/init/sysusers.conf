# override these settings by copying this to /etc/sysusers.d/ and modifying it therein

# Type Name ID GECOS Home directory Shell
u kodi - "Kodi User" /var/lib/kodi

# ensure all groups kodi needs exist regardless of what dependencies provide
# membership is granted only at runtime via SupplementaryGroups= in the service units
g audio     -
g optical   -
g video     -

# dma_heap access group - granted only to kodi-gbm.service via SupplementaryGroups=
g video_dma -
